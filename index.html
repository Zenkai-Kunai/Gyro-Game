<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro FPS Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            overflow: hidden;
        }

        /* HUD overlay */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(56, 189, 248, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }

        #crosshair::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 4px;
            height: 4px;
            background-color: #38bdf8;
            border-radius: 50%;
        }

        /* Game world wrapper that rotates based on gyro */
        #world {
            position: absolute;
            width: 300vw;
            height: 300vh;
            top: -100vh;
            left: -100vw;
            transform-origin: center center;
            will-change: transform;
        }

        /* Targets */
        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ef4444 40%, #b91c1c 100%);
            border-radius: 50%;
            border: 3px solid #f8fafc;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .target::after {
            content: '';
            width: 20px;
            height: 20px;
            background-color: #f8fafc;
            border-radius: 50%;
        }

        /* Shoot Button */
        #shoot-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            background-color: #ef4444;
            border: 4px solid #f8fafc;
            border-radius: 50%;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.5);
            z-index: 10;
            user-select: none;
        }

        #shoot-btn:active {
            transform: scale(0.92);
            background-color: #dc2626;
        }

        /* Start Screen Modal */
        #modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #modal h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        #modal p {
            color: #94a3b8;
            max-width: 300px;
            margin-bottom: 30px;
        }

        #start-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>

    <div id="modal">
        <h1>GYRO SHOOTER</h1>
        <p>Hold your phone steady, tap start, and tilt your device to aim at targets. Press the SHOOT button to fire!</p>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-container">
        <div class="hud">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">30</span>s</div>
        </div>

        <div id="crosshair"></div>

        <div id="world">
            <!-- Dynamic targets will spawn here -->
        </div>

        <div id="shoot-btn">SHOOT</div>
    </div>

    <script>
        const world = document.getElementById('world');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const shootBtn = document.getElementById('shoot-btn');
        const modal = document.getElementById('modal');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let timerInterval;

        // Gyro tracking variables
        let baseGamma = null;
        let baseBeta = null;
        let currentGamma = 0;
        let currentBeta = 0;

        function handleOrientation(event) {
            if (!gameActive) return;

            if (baseGamma === null && event.gamma !== null) baseGamma = event.gamma;
            if (baseBeta === null && event.beta !== null) baseBeta = event.beta;

            // Calculate relative offset from starting position
            currentGamma = (event.gamma - baseGamma) * 15; // Sensitivity multiplier X
            currentBeta = (event.beta - baseBeta) * 15;   // Sensitivity multiplier Y

            // Move the world container opposite to device tilt to simulate looking around
            world.style.transform = `translate(${-currentGamma}px, ${currentBeta}px)`;
        }

        async function startGame() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response !== 'granted') {
                        alert("Gyroscope permission is required to play!");
                        return;
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            modal.style.display = 'none';
            gameActive = true;
            score = 0;
            timeLeft = 30;
            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;

            baseGamma = null;
            baseBeta = null;

            window.addEventListener('deviceorientation', handleOrientation);
            spawnTarget();

            // Start Countdown Timer
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function spawnTarget() {
            if (!gameActive) return;

            // Remove existing target if any
            const existing = world.querySelector('.target');
            if (existing) existing.remove();

            const target = document.createElement('div');
            target.classList.add('target');

            // Random position inside the world bounds
            const randomX = Math.random() * (window.innerWidth * 1.5) + (window.innerWidth * 0.75);
            const randomY = Math.random() * (window.innerHeight * 1.5) + (window.innerHeight * 0.75);

            target.style.left = `${randomX}px`;
            target.style.top = `${randomY}px`;

            world.appendChild(target);
        }

        function shoot() {
            if (!gameActive) return;

            const target = world.querySelector('.target');
            if (!target) return;

            // Check if crosshair (center of screen) intersects with the target bounds
            const targetRect = target.getBoundingClientRect();
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            if (
                centerX >= targetRect.left &&
                centerX <= targetRect.right &&
                centerY >= targetRect.top &&
                centerY <= targetRect.bottom
            ) {
                score += 10;
                scoreEl.textContent = score;
                target.remove();
                spawnTarget(); // Spawn next target immediately
            }
        }

        startBtn.addEventListener('click', startGame);
        shootBtn.addEventListener('click', shoot);

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            window.removeEventListener('deviceorientation', handleOrientation);
            
            modal.style.display = 'flex';
            modal.querySelector('h1').textContent = "GAME OVER";
            modal.querySelector('p').textContent = `You scored ${score} points! Tap below to play again.`;
            startBtn.textContent = "Play Again";
        }
    </script>
</body>
</html>
